name: CD - Deploy to Google Compute Engine

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: europe-west1 # Change to your region
  REPOSITORY: medinote-repo
  IMAGE_BACKEND: medinote-backend
  IMAGE_FRONTEND: medinote-frontend
  VM_NAME: medinote-vps
  VM_ZONE: europe-west1-b
  SSH_PRIVATE_KEY: ${{ secrets.GCP_SSH_KEY }}
  SSH_USER: ${{ secrets.GCP_USERNAME }}
  VM_IP: ${{ secrets.GCP_VM_IP }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${GAR_LOCATION}-docker.pkg.dev --quiet

      - name: Build and Push Backend Image
        run: |
          docker build -t ${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_BACKEND}:latest ./backend
          docker push ${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_BACKEND}:latest

      - name: Build and Push Frontend Image
        run: |
          docker build -t ${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_FRONTEND}:latest ./frontend
          docker push ${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_FRONTEND}:latest

      - name: Copy docker-compose to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.VM_IP }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "~/medinote/"

      - name: Deploy to GCE VM via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.VM_IP }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          script: |
            cd ~/medinote
            gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet
            GCP_PROJECT_ID=${{ env.PROJECT_ID }} docker compose pull
            GCP_PROJECT_ID=${{ env.PROJECT_ID }} docker compose up -d
            docker image prune -f
